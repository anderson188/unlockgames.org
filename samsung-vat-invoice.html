<!DOCTYPE html>
<html lang="en-GB">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Samsung UK VAT Invoice</title>
  <style>
    * { box-sizing: border-box; }
    body { margin: 0; font-family: Arial, sans-serif; font-size: 12px; color: #000; background: #fff; padding: 24px; }
    .invoice { max-width: 900px; margin: 0 auto; }
    .header { display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: 20px; }
    .header h1 { margin: 0; font-size: 24px; font-weight: 700; }
    .header .logo { color: #1428a0; font-weight: 800; font-size: 28px; letter-spacing: 0.02em; }
    .two-col { display: flex; gap: 40px; margin-bottom: 20px; }
    .two-col .left { flex: 1; }
    .two-col .right { flex: 1; }
    .invoice-line .invoice-label { margin-right: 1.2em; }
    .label { font-weight: 700; margin-bottom: 4px; }
    .three-col { display: flex; gap: 0; margin-bottom: 24px; border: 1px solid #ccc; border-radius: 4px; overflow: hidden; }
    .three-col .col { flex: 1; padding: 14px 16px; border-left: 1px solid #ccc; min-width: 0; }
    .three-col .col:first-child { border-left: none; }
    .card-masked { font-family: monospace; font-size: 14px; letter-spacing: 2px; margin-top: 6px; color: #333; }
    table { width: 100%; border-collapse: collapse; margin-bottom: 16px; }
    th, td { border: 1px solid #ddd; padding: 8px; text-align: left; }
    th { background: #f5f5f5; font-weight: 700; }
    td.num, th.num { text-align: right; }
    .item-model { font-size: 11px; color: #555; }
    .imei-row { font-size: 11px; color: #555; padding-top: 2px !important; border-top: none !important; }
    .summary { text-align: right; max-width: 320px; margin-left: auto; margin-bottom: 24px; }
    .summary .row { display: flex; justify-content: space-between; gap: 24px; margin-bottom: 4px; }
    .summary .row.total { font-weight: 700; font-size: 14px; margin-top: 8px; padding-top: 8px; border-top: 1px solid #000; }
    .footer { font-size: 10px; color: #6b6b6b; margin-top: 24px; line-height: 1.4; }
    .footer-total { margin-top: 16px; padding-top: 12px; border-top: 1px solid #ddd; display: flex; justify-content: space-between; align-items: center; font-size: 14px; font-weight: 700; color: #000; }
  </style>
</head>
<body>
  <div id="invoiceRoot" class="invoice"></div>
  <script>
    (function () {
      function escapeHtml(s) { var d = document.createElement('div'); d.textContent = s; return d.innerHTML; }
      var ORDERS_32 = [
        { date: '01 Mar 2026', amount: 1274.16 }, { date: '28 Feb 2026', amount: 2801.94 }, { date: '28 Feb 2026', amount: 805.83 },
        { date: '28 Feb 2026', amount: 790.83 }, { date: '28 Feb 2026', amount: 774.16 }, { date: '28 Feb 2026', amount: 697.07 },
        { date: '28 Feb 2026', amount: 435.00 }, { date: '28 Feb 2026', amount: 332.50 }, { date: '28 Feb 2026', amount: 732.50 },
        { date: '27 Feb 2026', amount: 1330.48 }, { date: '27 Feb 2026', amount: 1274.16 }, { date: '27 Feb 2026', amount: 954.83 },
        { date: '27 Feb 2026', amount: 758.16 }, { date: '27 Feb 2026', amount: 753.33 }, { date: '27 Feb 2026', amount: 701.66 },
        { date: '27 Feb 2026', amount: 679.57 }, { date: '27 Feb 2026', amount: 666.79 }, { date: '27 Feb 2026', amount: 643.99 },
        { date: '27 Feb 2026', amount: 643.33 }, { date: '27 Feb 2026', amount: 618.33 }, { date: '27 Feb 2026', amount: 608.57 },
        { date: '27 Feb 2026', amount: 516.06 }, { date: '27 Feb 2026', amount: 545.00 }, { date: '27 Feb 2026', amount: 545.00 },
        { date: '27 Feb 2026', amount: 493.33 }, { date: '27 Feb 2026', amount: 360.00 }, { date: '27 Feb 2026', amount: 299.25 },
        { date: '27 Feb 2026', amount: 157.50 }, { date: '27 Feb 2026', amount: 116.00 }, { date: '27 Feb 2026', amount: 107.50 },
        { date: '27 Feb 2026', amount: 36.08 }, { date: '27 Feb 2026', amount: 732.50 },
      ];
      var PRODUCTS_WITH_PRICES = [
        { name: 'Galaxy S26 Ultra 1TB', id: 'SM-S948BZKGEUA', price: 1399 }, { name: 'Galaxy S26 Ultra 512GB', id: 'SM-S948BZKBEUA', price: 1199 },
        { name: 'Galaxy S26 Ultra 256GB', id: 'SM-S948BZKAEUA', price: 999 }, { name: 'Galaxy S26+ 512GB', id: 'SM-S947BZKBEUA', price: 899 },
        { name: 'Galaxy S26+ 256GB', id: 'SM-S947BZKAEUA', price: 799 }, { name: 'Galaxy S26 256GB', id: 'SM-S946BZKAEUA', price: 699 },
        { name: 'Galaxy S26 128GB', id: 'SM-S946BZKAEUB', price: 599 }, { name: 'Galaxy Z Fold7 512GB (Unlocked)', id: 'SM-F966UZKEXAA', price: 1799 },
        { name: 'Galaxy Z Fold7 256GB', id: 'SM-F966UZKAXAA', price: 1599 }, { name: 'Galaxy Z Flip7 512GB', id: 'SM-F761BZKBEUA', price: 1049 },
        { name: 'Galaxy Z Flip7 256GB', id: 'SM-F761BZKAEUA', price: 949 }, { name: 'Galaxy Z Fold6 512GB', id: 'SM-F956BZKBEUA', price: 1699 },
        { name: 'Galaxy Z Fold6 256GB', id: 'SM-F956BZKAEUA', price: 1499 }, { name: 'Galaxy Z Flip6 256GB', id: 'SM-F751BZKAEUA', price: 849 },
        { name: 'Galaxy A56 5G 256GB', id: 'SM-A566BZKAEUA', price: 449 }, { name: 'Galaxy A56 5G 128GB', id: 'SM-A566BZKAEUB', price: 399 },
        { name: 'Galaxy A35 5G', id: 'SM-A356BZKAEUA', price: 299 }, { name: 'Galaxy A55 5G', id: 'SM-A556BZKAEUA', price: 349 },
        { name: 'Galaxy A15 5G', id: 'SM-A156BZKAEUA', price: 149 }, { name: 'Galaxy A25 5G', id: 'SM-A256BZKAEUA', price: 249 },
        { name: 'Galaxy Z Fold7 Anti-Reflecting Film, Transparent', id: 'EF-UF966CTEGUS', price: 24 }, { name: 'Anti-reflecting Film for Galaxy S26+', id: 'EF-S947CLEGWW', price: 24 },
        { name: 'Galaxy S26 Ultra Screen Protector', id: 'EF-S948CLEGWW', price: 24 }, { name: 'Galaxy Buds4 Pro', id: 'SM-R510NLVAEUA', price: 219 },
        { name: 'Galaxy Buds4', id: 'SM-R510NLAEUA', price: 169 }, { name: 'Galaxy Buds Pro', id: 'SM-R190NZKAEUA', price: 199 },
        { name: 'Galaxy Buds FE', id: 'SM-R400NLAEUA', price: 99 }, { name: 'Galaxy Buds', id: 'SM-R180NZAEUA', price: 149 },
        { name: 'Galaxy Smartphone Case, Clear', id: 'EF-QS948CLEGWW', price: 49 }, { name: 'Galaxy Z Fold7 Standing Cover', id: 'EF-VF966TBEGUS', price: 59 },
        { name: 'Wireless Charger Trio', id: 'EP-P5400TBEGWW', price: 89 }, { name: 'Super Fast Charging 45W Adapter', id: 'EP-TA845XBGEGWW', price: 49 },
        { name: 'SmartTag2', id: 'EI-T5300NBEGWW', price: 29 }, { name: 'Galaxy Watch Band, Leather', id: 'SM-R960FZKAEUA', price: 49 },
        { name: 'Galaxy Tab S11 Book Cover', id: 'EF-DT731TBEGEU', price: 69 }, { name: 'USB-C Cable 1m', id: 'EP-DN980CBEGWW', price: 15 },
      ];
      var MANCHESTER_ADDRESSES = [
        '12 Oxford Road\nManchester\nM1 5AN\nUK',
        '45 Deansgate\nManchester\nM3 2BG\nUK',
        '78 King Street\nManchester\nM2 4LY\nUK',
      ];
      var VAT_RATE = 0.2;
      var MAX_ITEMS_PER_INVOICE = 4;
      function matchProducts(targetAmount) {
        var target = Math.round(targetAmount * 100) / 100;
        var products = PRODUCTS_WITH_PRICES.slice().sort(function (a, b) { return b.price - a.price; });
        var best = { items: [], sum: 0, diff: 1e9 };
        var tol = Math.max(20, target * 0.08);
        function search(start, sum, chosen) {
          if (chosen.length > MAX_ITEMS_PER_INVOICE) return;
          var diff = Math.abs(sum - target);
          if (sum > 0) {
            if (diff < best.diff || (diff <= best.diff + 2 && chosen.length < best.items.length))
              best = { items: chosen.slice(), sum: sum, diff: diff };
          }
          if (sum > target + tol) return;
          for (var i = start; i < products.length; i++) {
            var p = products[i];
            if (sum + p.price <= target + tol) { chosen.push(p); search(i + 1, sum + p.price, chosen); chosen.pop(); }
          }
        }
        search(0, 0, []);
        if (best.items.length === 0) {
          var asc = products.filter(function (p) { return p.price <= target; }).reverse();
          for (var j = 0; j < asc.length && best.sum < target * 0.9 && best.items.length < MAX_ITEMS_PER_INVOICE; j++) {
            best.items.push(asc[j]); best.sum += asc[j].price;
          }
        }
        return best.items;
      }
      function dateToDDMMYYYY(dateStr) {
        var parts = dateStr.split(' ');
        if (parts.length !== 3) return dateStr;
        var d = parseInt(parts[0], 10), m = { Jan: '01', Feb: '02', Mar: '03' }[parts[1]] || '01', y = parts[2];
        return (d < 10 ? '0' : '') + d + '/' + m + '/' + y;
      }
      function genIMEI(seed) {
        var s = '' + seed;
        while (s.length < 15) s = '0' + (Math.sin(seed++) * 1e9).toString().replace('-', '');
        return s.slice(0, 15);
      }
      function genSerial(seed) {
        var chars = 'ABCDEFGHJKLMNPQRSTUVWXYZ23456789';
        var out = '';
        for (var i = 0; i < 12; i++) out += chars[Math.abs((seed * (i + 1) + i) % chars.length)];
        return out;
      }
      function maskedCardNumber(index) {
        var seed = index * 7919 + 300003;
        var last4 = '';
        for (var i = 0; i < 4; i++) {
          var x = Math.sin(seed * 12.9898 + i * 78.233) * 43758.5453;
          last4 += Math.abs(Math.floor((x - Math.floor(x)) * 10)) % 10;
        }
        return '**** **** **** ' + last4;
      }
      var invoiceIndex = parseInt((/invoice=(\d+)/.exec(location.search) || [])[1], 10);
      if (isNaN(invoiceIndex) || invoiceIndex < 0 || invoiceIndex >= 32) invoiceIndex = 0;
      var order = ORDERS_32[invoiceIndex];
      var products = matchProducts(order.amount);
      var totalExVat = order.amount / (1 + VAT_RATE);
      var priceById = {};
      PRODUCTS_WITH_PRICES.forEach(function (p) { priceById[p.id] = p.price; });
      var sumPrice = 0;
      products.forEach(function (p) { sumPrice += priceById[p.id] || 0; });
      var lines = products.map(function (p, i) {
        var ratio = (priceById[p.id] || 0) / sumPrice;
        var unitVal = totalExVat * ratio;
        var vat = unitVal * VAT_RATE;
        var total = unitVal + vat;
        return {
          name: p.name, id: p.id, qty: 1, unitValue: unitVal, vat: vat, total: total,
          imei: /Tab|Fold|Flip|S26|A56|A35|A55|A15|A25/.test(p.name) ? genIMEI(invoiceIndex * 100 + i) : null,
          serial: /Watch|Buds|SmartTag|Charger|Case|Cover|Cable|Film|Protector/.test(p.name) ? genSerial(invoiceIndex * 100 + i) : null,
        };
      });
      var hasDiscount = [0, 2, 5, 8, 11, 14, 17, 19, 22, 26, 29].indexOf(invoiceIndex) >= 0;
      var discountAmount = hasDiscount ? Math.round(order.amount * (0.05 + Math.sin(invoiceIndex) * 0.05) * 100) / 100 : 0;
      function orderNumberDigits(seed, length) {
        var out = '';
        for (var i = 0; i < length; i++) {
          var x = Math.sin(seed * 12.9898 + i * 78.233) * 43758.5453;
          out += Math.abs(Math.floor((x - Math.floor(x)) * 10)) % 10;
        }
        return out;
      }
      var orderNumber = 'UK' + orderNumberDigits(invoiceIndex * 7919 + 100001, 10);
      var invoiceNumber = 'UK' + orderNumberDigits(invoiceIndex * 6781 + 200002, 10);
      var addrIndex = [1, 0, 2, 0, 1, 2, 1, 0, 2, 0, 1, 2, 0, 2, 1, 0, 2, 1, 0, 1, 2, 0, 2, 1, 0, 1, 2, 1, 0, 2, 0, 1][invoiceIndex];
      var address = MANCHESTER_ADDRESSES[addrIndex];
      var dateStr = dateToDDMMYYYY(order.date);
      var root = document.getElementById('invoiceRoot');
      var cardDisplay = '<div class="card-masked">' + escapeHtml(maskedCardNumber(invoiceIndex)) + '</div>';
      var rows = lines.map(function (line) {
        var tr = '<tr><td>' + escapeHtml(line.name) + '<br><span class="item-model">' + escapeHtml(line.id) + '</span></td><td class="num">' + line.qty + '</td><td class="num">£ ' + line.unitValue.toFixed(2) + '</td><td class="num">20%</td><td class="num">£ ' + line.unitValue.toFixed(2) + '</td><td class="num">£ ' + line.vat.toFixed(2) + '</td><td class="num">£ ' + line.total.toFixed(2) + '</td></tr>';
        if (line.imei) tr += '<tr class="imei-row"><td colspan="7">IMEI number(s): ' + line.imei + '</td></tr>';
        if (line.serial) tr += '<tr class="imei-row"><td colspan="7">Serial number(s): ' + line.serial + '</td></tr>';
        return tr;
      }).join('');
      rows += '<tr><td>Delivery Only All Day</td><td class="num">1</td><td class="num">£ 0.00</td><td class="num">20%</td><td class="num">£ 0.00</td><td class="num">£ 0.00</td><td class="num">£ 0.00</td></tr>';
      var totalExVatSum = lines.reduce(function (s, l) { return s + l.unitValue; }, 0);
      var vatSum = lines.reduce(function (s, l) { return s + l.vat; }, 0);
      root.innerHTML =
        '<div class="header"><h1>VAT Receipt</h1><span class="logo">SAMSUNG</span></div>' +
        '<div class="two-col"><div class="left"><div class="label">Order number: ' + orderNumber + '</div><div>Order date: ' + dateStr + '</div></div><div class="right"><div class="label invoice-line"><span class="invoice-label">Invoice</span>' + invoiceNumber + '</div><div>Invoice date: ' + dateStr + '</div></div></div>' +
        '<div class="three-col"><div class="col"><div class="label">Payment type:</div><div>Credit Card</div>' + cardDisplay + '</div>' +
        '<div class="col"><div class="label">Invoice address:</div><pre style="margin:0;white-space:pre-wrap;font-family:inherit;">' + escapeHtml(address) + '</pre></div>' +
        '<div class="col"><div class="label">Shipping to:</div><pre style="margin:0;white-space:pre-wrap;font-family:inherit;">' + escapeHtml(address) + '</pre></div></div>' +
        '<table><thead><tr><th>ITEM</th><th class="num">QTY</th><th class="num">UNIT PRICE</th><th class="num">VAT RATE</th><th class="num">UNIT VALUE</th><th class="num">VAT</th><th class="num">TOTAL</th></tr></thead><tbody>' + rows + '</tbody></table>' +
        '<div class="summary">' +
        (hasDiscount ? '<div class="row">Discount applied to order total: £ ' + discountAmount.toFixed(2) + '</div><div class="row">Total savings: £ ' + discountAmount.toFixed(2) + '</div>' : '') +
        '<div class="row">Delivery and installation cost: £ 0.00</div><div class="row">Total excluding VAT: £ ' + totalExVatSum.toFixed(2) + '</div><div class="row">VAT: £ ' + vatSum.toFixed(2) + '</div>' +
        '<div class="row total">Total: £ ' + order.amount.toFixed(2) + '</div></div>' +
        '<div class="footer">Copyright © Samsung Electronics (UK) Ltd. All rights reserved. Registered address - Samsung House, 2000 Hillswood Drive, Chertsey, Surrey, KT16 ORS, No. 03086621 VAT Number: GB 689376366</div>' +
        '<div class="footer-total"><span>Total</span><span>£ ' + order.amount.toFixed(2) + '</span></div>';
    })();
  </script>
</body>
</html>
