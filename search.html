    <script>
(function() {
    var params = new URLSearchParams(window.location.search);
    var q = (params.get('q') || '').trim();
    var searchInput = document.getElementById('headerSearch');
    var resultsEl = document.getElementById('search-results');
    var titleEl = document.getElementById('search-results-title');

    if (searchInput) searchInput.value = q;

    function renderResults(articles) {
        if (!q) {
            titleEl.textContent = 'Search articles';
            resultsEl.innerHTML = '<p>Enter a keyword above and press Search to find articles.</p>';
            return;
        }
        if (!articles || articles.length === 0) {
            titleEl.textContent = 'Search results for “‘ + escapeHtml(q) + '"';
            resultsEl.innerHTML = '<p>No articles found. Try different keywords.</p>';
            return;
        }
        titleEl.textContent = 'Search results for “‘ + escapeHtml(q) + '" (' + articles.length + ')';
        var html = '<ul class="sidebar-list" style="list-style:none; padding:0;">';
        for (var i = 0; i < articles.length; i++) {
            var a = articles[i];
            var href = 'blogs/' + (a.file || a.fileName || '');
            var title = a.title || 'Article';
            var date = a.date || '';
            html += '<li style="margin-bottom:0.75rem;"><a href="' + escapeAttr(href) + '">' + escapeHtml(title) + '</a>';
            if (date) html += ' <span class="sidebar-date" style="color:var(--text-muted);font-size:0.85rem;">' + escapeHtml(date) + '</span>';
            html += '</li>';
        }
        html += '</ul>';
        resultsEl.innerHTML = html;
    }

    function escapeHtml(s) {
        var div = document.createElement('div');
        div.textContent = s;
        return div.innerHTML;
    }
    function escapeAttr(s) {
        return String(s).replace(/&/g, '&amp;').replace(/"/g, '&quot;').replace(/'/g, '&#39;').replace(/</g, '&lt;').replace(/>/g, '&gt;');
    }

    function matchItem(item, key) {
        var t = (item.title || '').toLowerCase();
        if (t.indexOf(key) !== -1) return true;
        var m = (item.metaDesc || '').toLowerCase();
        if (m.indexOf(key) !== -1) return true;
        if (item.brand && item.brand.titles && Array.isArray(item.brand.titles)) {
            for (var j = 0; j < item.brand.titles.length; j++) {
                if ((item.brand.titles[j] || '').toLowerCase().indexOf(key) !== -1) return true;
            }
        }
        return false;
    }

    function runSearch() {
        if (!q) {
            renderResults(null);
            return;
        }
        var key = q.toLowerCase();
        fetch('blogs/articles-list.json')
            .then(function(r) { if (!r.ok) throw new Error(); return r.json(); })
            .then(function(list) {
                var out = [];
                for (var i = 0; i < list.length; i++) {
                    var item = list[i];
                    if (matchItem(item, key)) out.push({ title: item.title, file: item.file, date: item.date });
                }
                renderResults(out);
            })
            .catch(function() {
                var fallback = window.UNLOCKGAMES_SEARCH_FALLBACK || [];
                var out = [];
                for (var i = 0; i < fallback.length; i++) {
                    var item = fallback[i];
                    if ((item.title || '').toLowerCase().indexOf(key) !== -1) out.push(item);
                }
                if (out.length) renderResults(out);
                else {
                    titleEl.textContent = 'Search results for “‘ + escapeHtml(q) + '"';
                    resultsEl.innerHTML = '<p>No articles found. Try different keywords. (Search data may be unavailable when opening files locally—use a web server to load the full index.)</p>';
                }
            });
    }

    runSearch();
})();
    </script>
